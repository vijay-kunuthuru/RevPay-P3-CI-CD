spring.application.name=transaction-service

# --- DYNAMIC DOCKER NETWORKING ---
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/revpay_transaction_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Vijay@2003

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.cloud.openfeign.circuitbreaker.enabled=true
server.port=8083

# --- DYNAMIC EUREKA NETWORKING ---
eureka.client.service-url.defaultZone=http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/

management.endpoints.web.exposure.include=*

# --- RESILIENCE4J CONFIGURATION (PRESERVED) ---
resilience4j.circuitbreaker.instances.wallet-service.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.wallet-service.slidingWindowSize=10
resilience4j.circuitbreaker.instances.wallet-service.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.wallet-service.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.instances.wallet-service.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.wallet-service.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.wallet-service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.wallet-service.eventConsumerBufferSize=10