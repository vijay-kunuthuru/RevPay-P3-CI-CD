server.port=8095
spring.application.name=api-gateway

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# --- STRICT DOCKER ROUTING TO EUREKA ---
# NOTE: If your Eureka container is named something else in docker-compose.yml
# (like 'eureka-server'), change 'discovery-server' to match it!
eureka.client.serviceUrl.defaultZone=http://discovery-server:8761/eureka/

# --- DYNAMIC ROUTING CONFIGURATION (No .mvc!) ---
spring.cloud.gateway.routes[0].id=admin-loan-service
spring.cloud.gateway.routes[0].uri=http://loan-service:8085
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/admin/loans/**

spring.cloud.gateway.routes[1].id=transaction-service
spring.cloud.gateway.routes[1].uri=http://transaction-service:8083
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/transactions/**,/api/v1/business/analytics/**

spring.cloud.gateway.routes[2].id=user-service
spring.cloud.gateway.routes[2].uri=http://user-service:8081
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/auth/**,/api/v1/admin/**,/api/v1/users/**,/api/v1/business/**,/api/users/**,/api/auth/**

spring.cloud.gateway.routes[3].id=wallet-service
spring.cloud.gateway.routes[3].uri=http://wallet-service:8082
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/wallets/**

spring.cloud.gateway.routes[4].id=invoice-service
spring.cloud.gateway.routes[4].uri=http://invoice-service:8084
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/invoices/**

spring.cloud.gateway.routes[5].id=loan-service
spring.cloud.gateway.routes[5].uri=http://loan-service:8085
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/loans/**

spring.cloud.gateway.routes[6].id=notification-service
spring.cloud.gateway.routes[6].uri=http://notification-service:8086
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/notifications/**

# --- MANAGEMENT & JVM FIXES ---
management.endpoint.gateway.enabled=true
management.endpoints.web.exposure.include=gateway,health,info

eureka.client.tls.enabled=false
eureka.client.transport.use-jdk-client=true